<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700">
  <!-- Fondo blanco -->
  <rect width="1400" height="700" fill="#F8F9FA"/>
  
  <!-- PLAYKO Principal -->
  <g transform="translate(80, 180)">
    <!-- PLAY (Navy #0F172A) -->
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="220" font-weight="900" fill="#0F172A" letter-spacing="-8">PLAY</text>
    
    <!-- KO (Royal Blue #2563EB) -->
    <text x="740" y="0" font-family="Inter, system-ui, sans-serif" font-size="220" font-weight="900" fill="#2563EB" letter-spacing="-8">KO</text>
    
    <!-- Registered Mark ® -->
    <text x="1210" y="-60" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="500" fill="#0F172A">®</text>
  </g>
  
  <!-- Tagline: PINTURA PARA CANCHAS DEPORTIVAS -->
  <g transform="translate(80, 420)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="600" fill="#0F172A" letter-spacing="8" style="text-transform:uppercase">PINTURA PARA CANCHAS DEPORTIVAS</text>
  </g>
</svg>
